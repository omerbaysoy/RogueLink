{% extends "base.html" %}
{% block content %}
<h1>Logs</h1>

<nav class="logtabs">
  {% for name, exists in logs.items() %}
    <a href="/logs?name={{ name }}" class="{% if selected == name %}active{% endif %}">
      {{ name }}{% if not exists %} (empty){% endif %}
    </a>
  {% endfor %}
</nav>

<pre class="log-output">{% for line in lines %}{{ line }}
{% endfor %}</pre>
{% endblock %}
