{% extends "base.html" %}
{% block content %}
<h1>Management Network</h1>

<section class="card">
  <p><strong>Interface:</strong> {{ mgmt.iface or "—" }}</p>
  <p><strong>IP:</strong> {{ mgmt.ip or "—" }}</p>
  <p><strong>State:</strong> {{ mgmt.operstate }}</p>
</section>

<section class="card">
  <h2>Configure</h2>
  <form action="javascript:void(0)" method="post" data-api="/api/management/configure" data-method="POST" data-result="#result-mgmt-configure">
    <label>SSID <input name="ssid" value="{{ cfg.management.ssid }}" required></label>
    <label>PSK <input name="psk" type="password" value="{{ cfg.management.psk }}"></label>
    <label>Country <input name="country" value="{{ cfg.general.country_code }}" maxlength="2"></label>
    <button type="submit">Save</button>
  </form>
  <div class="api-result" id="result-mgmt-configure"></div>
  <form action="javascript:void(0)" method="post" data-api="/api/management/connect" data-method="POST" data-result="#result-mgmt-connect">
    <button type="submit">(Re)connect</button>
  </form>
  <div class="api-result" id="result-mgmt-connect"></div>
</section>
{% endblock %}
