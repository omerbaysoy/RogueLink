<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} Dashboard{% if page %} — {{ page|title }}{% endif %}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-name">{{ title }}</span>
      <span class="brand-sub">{{ subtitle }}</span>
    </div>
    <nav class="nav">
      <a href="/" class="{% if page == 'overview' %}active{% endif %}">Overview</a>
      <a href="/adapters" class="{% if page == 'adapters' %}active{% endif %}">Adapters</a>
      <a href="/management" class="{% if page == 'management' %}active{% endif %}">Management</a>
      <a href="/wan" class="{% if page == 'wan' %}active{% endif %}">WAN</a>
      <a href="/ap" class="{% if page == 'ap' %}active{% endif %}">AP</a>
      <a href="/lan" class="{% if page == 'lan' %}active{% endif %}">LAN</a>
      <a href="/system" class="{% if page == 'system' %}active{% endif %}">System</a>
      <a href="/logs" class="{% if page == 'logs' %}active{% endif %}">Logs</a>
    </nav>
    <div class="version">v{{ version }}</div>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>{{ title }} {{ subtitle }} · v{{ version }}</span>
  </footer>
</body>
</html>
